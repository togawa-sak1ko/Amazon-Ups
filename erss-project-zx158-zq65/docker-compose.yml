services:
  web:
    build: .
    command: sh ./scripts/start-web.sh
    env_file:
      - .env
    ports:
      - "${HOST_APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app

  worker:
    build: .
    command: sh ./scripts/start-worker.sh
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: amazon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amazon"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
